name: Auto Prefix Odoo Manifest Version

on:
  push:
    branches:
      - '17.0'
      - '18.0'
      - '19.0'

jobs:
  prefix_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the workflow to commit the changes back
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: Update Manifest Versions
        run: |
          # 1. Get the current target branch name (e.g., "19.0")
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Target Odoo major version prefix: $BRANCH_NAME"
          
          # 2. Look through all subdirectories for manifest files
          find . -name "__manifest__.py" | while read manifest; do
            echo "Processing file: $manifest"
            
            # Use Python to safely clean up any existing Odoo prefix and set the new one
            python3 -c "
          import re
          
          with open('$manifest', 'r') as f:
              content = f.read()
          
          # Match 'version': 'X.X.X' or 'version': '19.0.X.X.X'
          # This regex captures the trailing 3-digit semantic format cleanly
          pattern = r\"(['\"]version['\"]\s*:\s*['\"])(?:\d+\.\d+\.)?(\d+\.\d+\.\d+)(['\"])\"
          
          # Replace with branch prefix + semantic version
          updated_content = re.sub(pattern, rf'\1'$BRANCH_NAME'.\2\3', content)
          
          with open('$manifest', 'w') as f:
              f.write(updated_content)
          "
          done

      - name: Commit and Push Version Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if changes were actually made to prevent infinite action loops
          if [[ -n "$(git status --porcelain)" ]]; then
            git add "**/__manifest__.py"
            git commit -m "chore: auto-prefix manifest versions with Odoo $BRANCH_NAME [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No manifest adjustments needed."
          fi
